  <!-- Subtitle -->
  <text x="600" y="320" text-anchor="middle" font-family="monospace" font-size="18" fill="#A87400" filter="url(#glow-soft)">[ PUGACHEV // FULLSTACK DEVELOPER // byigor.dev ]</text>

  <!-- Separator -->
